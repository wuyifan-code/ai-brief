# AI 早报配置

# RSS 信息源
rss:
  - url: "https://www.artificialintelligence-news.com/feed/"
    category: "AI"
    weight: 9
    enabled: true

  - url: "https://venturebeat.com/ai/feed/"
    category: "AI"
    weight: 8
    enabled: true

  - url: "https://www.theverge.com/rss/ai-artificial-intelligence/"
    category: "AI"
    weight: 7
    enabled: true

  - url: "https://feeds.feedburner.com/oreilly/radar"
    category: "AI/ML"
    weight: 6
    enabled: true

  - url: "https://blogs.nvidia.com/feed/"
    category: "AI/ML"
    weight: 9
    enabled: true

# GitHub 关注仓库
github:
  repos:
    - owner: "anthropics"
      repo: "claude-code"
      category: "AI Tools"
      weight: 9
      enabled: true

    - owner: "openai"
      repo: "o3"
      category: "LLM"
      weight: 10
      enabled: true

    - owner: "deepseek-ai"
      repo: "DeepSeek-V3"
      category: "LLM"
      weight: 10
      enabled: true

    - owner: "mistralai"
      repo: "mistral"
      category: "LLM"
      weight: 9
      enabled: true

    - owner: "meta-llama"
      repo: "llama"
      category: "LLM"
      weight: 9
      enabled: true

  keywords:
    - "LLM"
    - "GPT"
    - "Claude"
    - "Gemini"
    - "AI Model"
    - "multimodal"
    - "reasoning"

# 发布配置
publishing:
  title: "AI 早报"
  subtitle: "每日 AI 资讯精选"
  author: "AI Bot"
  description: "自动采集、筛选、发布的 AI 资讯早报"
  github_pages_path: "/ai-brief"
  base_url: "https://username.github.io/ai-brief"

# 视频配置
video:
  width: 1920
  height: 1080
  fps: 30
  font_family: "Noto Sans SC, Microsoft YaHei, sans-serif"
  title_font_size: 48
  body_font_size: 32
  theme_color: "#1a1a2e"
  accent_color: "#e94560"
  text_color: "#ffffff"
  max_chars_per_card: 150

# AI 处理配置
ai:
  dedup_similarity_threshold: 0.85
  dedup_window_hours: 72
  score_threshold: 5
  max_news_items: 20
  summary_length: 50
