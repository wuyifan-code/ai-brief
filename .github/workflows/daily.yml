name: Daily AI Brief

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 00:00 UTC = 08:00 CST
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip uninstall ai-brief -y 2>/dev/null || true
          pip install --no-cache-dir .

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Run daily pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: "https://api.minimaxi.com/v1"
          OPENAI_MODEL_FAST: "MiniMax-M2.7"
          OPENAI_MODEL_WRITER: "MiniMax-M2.7"
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          CI: "true"
        run: |
          python -m ai_brief run-daily --date $(date +%Y-%m-%d)

      - name: Deploy to GitHub Pages
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git checkout -b gh-pages
          git add site/ content/daily/ media/
          git diff --cached --quiet || git commit -m "Deploy: $(date +%Y-%m-%d)"
          git push -f origin gh-pages